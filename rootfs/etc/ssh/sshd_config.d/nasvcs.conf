# nasvcs sshd_config
HostKey /opt/nasvcs/etc/ssh/ssh_host_ecdsa_key
HostKey /opt/nasvcs/etc/ssh/ssh_host_ed25519_key
HostKey /opt/nasvcs/etc/ssh/ssh_host_rsa_key
AuthenticationMethods publickey
AuthorizedKeysFile /opt/nasvcs/user/authorized_keys
PermitRootLogin no
AllowUsers vcs

# TODO: remove legacy SSH client support
PubkeyAcceptedAlgorithms +ssh-rsa # allow legacy SSH clients
